<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stationary Brick Siege - Fixed</title>
    <style>
        body {
            background-color: #0b0b10;
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        canvas {
            border: 4px solid #fff;
            background-color: #121218;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.2);
        }
        #scoreBoard {
            font-size: 26px;
            margin-bottom: 15px;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div id="scoreBoard">Score: <span id="score">0</span></div>
    <canvas id="gameCanvas" width="560" height="680"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const scoreDisplay = document.getElementById("score");

let score = 0;
let gameOver = false;

// THE STATIONARY BRICK AT THE BOTTOM (Completely Unmovable)
const paddleHeight = 20;
const paddleWidth = 130; // Slightly wider to make up for zero magnet/movement
const paddleX = (canvas.width - paddleWidth) / 2; 
const paddleY = canvas.height - paddleHeight - 25;

// Ball Physics
let balls = [];
const baseBallRadius = 5;
const baseBallSpeed = 4.5;

// BRICK WALL SETTINGS
const brickRowCount = 8;       
const brickColumnCount = 13;    
const brickWidth = 38;
const brickHeight = 16;
const brickPadding = 3;
const brickOffsetTop = 40;
const brickOffsetLeft = 15;

const TYPES = {
    NORMAL: 'normal',
    BIG_BALL: 'bigBall',
    MULTI_BALL: 'multiBall',
    EXPLOSIVE: 'explosive'
};
const TYPE_COLORS = {
    [TYPES.NORMAL]: '#00f0ff',    // Cyber Cyan
    [TYPES.BIG_BALL]: '#ffcc00',  // Electric Yellow
    [TYPES.MULTI_BALL]: '#00ff66', // Neon Green
    [TYPES.EXPLOSIVE]: '#ff0055'  // Plasma Pink
};

let bricks = [];
let rowDropInterval = 7000; // Wall drops every 7 seconds
let lastDropTime = Date.now();

function initGame() {
    score = 0;
    gameOver = false;
    
    // Spawn initial ball with a clean, natural diagonal trajectory upward
    balls = [createNewBall(canvas.width / 2, paddleY - 20, 2.5, -baseBallSpeed)];
    
    // Build initial wall
    bricks = [];
    for (let r = 0; r < brickRowCount; r++) {
        bricks[r] = [];
        for (let c = 0; c < brickColumnCount; c++) {
            bricks[r][c] = createBrick();
        }
    }
    lastDropTime = Date.now();
}

function createNewBall(x, y, dx, dy, radius = baseBallRadius) {
    return { x, y, dx, dy, radius };
}

function createBrick() {
    // REDUCED FREQUENCY: Only a 15% chance of spawning a special brick now!
    let type = TYPES.NORMAL;
    const rand = Math.random();
    if (rand > 0.85) { 
        const types = [TYPES.BIG_BALL, TYPES.MULTI_BALL, TYPES.EXPLOSIVE];
        type = types[Math.floor(Math.random() * types.length)];
    }
    return { x: 0, y: 0, status: 1, type: type };
}

function dropWallDown() {
    let newRow = [];
    for (let c = 0; c < brickColumnCount; c++) {
        newRow.push(createBrick()); 
    }
    bricks.unshift(newRow); // Push rows down

    // FIXED LOOP BUG: Checked and verified loop counters to prevent game freezing
    for (let r = 0; r < bricks.length; r++) {
        for (let c = 0; c < bricks[r].length; c++) {
            if (bricks[r][c] && bricks[r][c].status === 1) {
                let brickY = (r * (brickHeight + brickPadding)) + brickOffsetTop;
                // If dropping wall reaches your stationary brick zone -> Game Over
                if (brickY + brickHeight >= paddleY - 5) {
                    gameOver = true;
                }
            }
        }
    }
}

function triggerBuff(type, hitRow, hitCol) {
    if (type === TYPES.BIG_BALL) {
        balls.forEach(b => b.radius = 12);
        setTimeout(() => balls.forEach(b => b.radius = baseBallRadius), 6000);
    } 
    else if (type === TYPES.MULTI_BALL) {
        // Spawn 2 extra balls breaking off clean left and right
        balls.push(createNewBall(canvas.width/2, paddleY - 10, -2.5, -4));
        balls.push(createNewBall(canvas.width/2, paddleY - 10, 2.5, -4));
    } 
    else if (type === TYPES.EXPLOSIVE) {
        // Clear a balanced 3x3 grid around the explosion
        for (let dr = -1; dr <= 1; dr++) {
            for (let dc = -1; dc <= 1; dc++) {
                let nr = hitRow + dr;
                let nc = hitCol + dc;
                if (bricks[nr] && bricks[nr][nc] && bricks[nr][nc].status === 1) {
                    bricks[nr][nc].status = 0;
                    score += 10;
                }
            }
        }
    }
}

function collisionDetection() {
    for (let r = 0; r < bricks.length; r++) {
        for (let c = 0; c < bricks[r].length; c++) {
            let b = bricks[r][c];
            if (b.status === 1) {
                let brickX = (c * (brickWidth + brickPadding)) + brickOffsetLeft;
                let brickY = (r * (brickHeight + brickPadding)) + brickOffsetTop;
                b.x = brickX;
                b.y = brickY;

                balls.forEach(ball => {
                    if (ball.x > brickX && ball.x < brickX + brickWidth && ball.y > brickY && ball.y < brickY + brickHeight) {
                        ball.dy = -ball.dy;
                        b.status = 0;
                        score += 10;
                        scoreDisplay.innerText = score;
                        triggerBuff(b.type, r, c);
                    }
                });
            }
        }
    }
}

function draw() {
    if (gameOver) {
        ctx.fillStyle = "rgba(10,10,15,0.9)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.font = "bold 36px sans-serif";
        ctx.fillStyle = "#ff0055";
        ctx.fillText("WALL CRUSH OVERRIDE", canvas.width / 2 - 210, canvas.height / 2);
        ctx.font = "20px sans-serif";
        ctx.fillStyle = "#ffffff";
        ctx.fillText(`Final Score: ${score}`, canvas.width / 2 - 65, canvas.height / 2 + 50);
        return;
    }

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 1. Draw Moving Brick Wall
    for (let r = 0; r < bricks.length; r++) {
        for (let c = 0; c < bricks[r].length; c++) {
            if (bricks[r][c].status === 1) {
                let brickX = (c * (brickWidth + brickPadding)) + brickOffsetLeft;
                let brickY = (r * (brickHeight + brickPadding)) + brickOffsetTop;
                ctx.beginPath();
                ctx.rect(brickX, brickY, brickWidth, brickHeight);
                ctx.fillStyle = TYPE_COLORS[bricks[r][c].type];
                ctx.fill();
                ctx.closePath();
            }
        }
    }

    // 2. Draw Unmovable Bottom Brick
    ctx.beginPath();
    ctx.rect(paddleX, paddleY, paddleWidth, paddleHeight);
    ctx.fillStyle = "#ffffff";
    ctx.fill();
    ctx.closePath();

    // 3. Process Balls (Pure Vector Physics - No Z-Shaping)
    for (let i = balls.length - 1; i >= 0; i--) {
        let ball = balls[i];
        
        ctx.beginPath();
        ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
        ctx.fillStyle = "#ffffff"; 
        ctx.fill();
        ctx.closePath();

        // Left/Right Screen Boundaries
        if (ball.x + ball.dx > canvas.width - ball.radius || ball.x + ball.dx < ball.radius) {
            ball.dx = -ball.dx;
        }
        // Top Screen Boundary
        if (ball.y + ball.dy < ball.radius) {
            ball.dy = -ball.dy;
        } 

        // Collision with the unmovable brick at the bottom
        if (ball.y + ball.dy > paddleY - ball.radius && ball.y < paddleY + paddleHeight) {
            if (ball.x > paddleX && ball.x < paddleX + paddleWidth) {
                // Angle depends purely on where it strikes the stationary surface
                let hitPoint = ball.x - (paddleX + paddleWidth / 2);
                ball.dx = hitPoint * 0.20; 
                ball.dy = -Math.abs(ball.dy); 
            } 
        }

        // Drop out of bounds check
        if (ball.y > canvas.height) {
            balls.splice(i, 1);
            continue;
        }

        ball.x += ball.dx;
        ball.y += ball.dy;
    }

    // Game Over condition if you drop your last ball
    if (balls.length === 0) {
        gameOver = true;
    }

    collisionDetection();

    // Infinite Wall Drop Timer
    if (Date.now() - lastDropTime > rowDropInterval) {
        dropWallDown();
        lastDropTime = Date.now();
        if (rowDropInterval > 2500) rowDropInterval -= 150; 
    }

    requestAnimationFrame(draw);
}

initGame();
draw();
</script>

</body>
</html>
