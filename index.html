<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stationary Brick Siege</title>
    <style>
        /* Modern resets to prevent mobile screen bouncing and scrolling */
        * {
            box-sizing: border-box;
            touch-action: none; /* Prevents accidental double-tap zoom on mobile */
        }
        body {
            background-color: #0b0b10;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            padding: 10px;
        }
        #scoreBoard {
            font-size: 22px;
            margin-bottom: 10px;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
        }
        /* Fluid canvas wrapper to adjust nicely for desktop or vertical phone screens */
        canvas {
            border: 3px solid #fff;
            background-color: #121218;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.15);
            max-width: 100%;
            max-height: 80vh;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <div id="scoreBoard">Score: <span id="score">0</span></div>
    <canvas id="gameCanvas" width="560" height="740"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const scoreDisplay = document.getElementById("score");

let score = 0;
let gameOver = false;

// THE STATIONARY BRICK AT THE BOTTOM (Stays completely unmovable)
const paddleHeight = 22;
const paddleWidth = 140; 
const paddleX = (canvas.width - paddleWidth) / 2; 
const paddleY = canvas.height - paddleHeight - 40;

// Ball Physics
let balls = [];
const baseBallRadius = 6;
const baseBallSpeed = 5;

// RESPONSIVE BRICK GRID
const brickRowCount = 8;       
const brickColumnCount = 11;    
const brickWidth = 46;
const brickHeight = 18;
const brickPadding = 4;
const brickOffsetTop = 50;
const brickOffsetLeft = 11;

const TYPES = {
    NORMAL: 'normal',
    BIG_BALL: 'bigBall',
    MULTI_BALL: 'multiBall',
    EXPLOSIVE: 'explosive'
};
const TYPE_COLORS = {
    [TYPES.NORMAL]: '#00f0ff',    
    [TYPES.BIG_BALL]: '#ffcc00',  
    [TYPES.MULTI_BALL]: '#00ff66', 
    [TYPES.EXPLOSIVE]: '#ff0055'  
};

let bricks = [];
let rowDropInterval = 7500; 
let lastDropTime = Date.now();

function initGame() {
    score = 0;
    gameOver = false;
    scoreDisplay.innerText = score;
    rowDropInterval = 7500;
    
    // Fire initial ball cleanly
    balls = [createNewBall(canvas.width / 2, paddleY - 30, 2.5, -baseBallSpeed)];
    
    // Create brick matrix
    bricks = [];
    for (let r = 0; r < brickRowCount; r++) {
        bricks[r] = [];
        for (let c = 0; c < brickColumnCount; c++) {
            bricks[r][c] = createBrick();
        }
    }
    lastDropTime = Date.now();
}

function createNewBall(x, y, dx, dy, radius = baseBallRadius) {
    return { x, y, dx, dy, radius };
}

function createBrick() {
    // 15% drop rate for special modifiers keeps the challenge balanced
    let type = TYPES.NORMAL;
    const rand = Math.random();
    if (rand > 0.85) { 
        const types = [TYPES.BIG_BALL, TYPES.MULTI_BALL, TYPES.EXPLOSIVE];
        type = types[Math.floor(Math.random() * types.length)];
    }
    return { x: 0, y: 0, status: 1, type: type };
}

function dropWallDown() {
    let newRow = [];
    for (let c = 0; c < brickColumnCount; c++) {
        newRow.push(createBrick()); 
    }
    bricks.unshift(newRow); 

    // Verify if any active descending brick touches the baseline zone
    for (let r = 0; r < bricks.length; r++) {
        for (let c = 0; c < bricks[r].length; c++) {
            if (bricks[r][c] && bricks[r][c].status === 1) {
                let brickY = (r * (brickHeight + brickPadding)) + brickOffsetTop;
                if (brickY + brickHeight >= paddleY - 10) {
                    gameOver = true;
                }
            }
        }
    }
}

function triggerBuff(type, hitRow, hitCol) {
    if (type === TYPES.BIG_BALL) {
        balls.forEach(b => b.radius = 14);
        setTimeout(() => balls.forEach(b => b.radius = baseBallRadius), 6000);
    } 
    else if (type === TYPES.MULTI_BALL) {
        balls.push(createNewBall(canvas.width/2, paddleY - 30, -3, -4));
        balls.push(createNewBall(canvas.width/2, paddleY - 30, 3, -4));
    } 
    else if (type === TYPES.EXPLOSIVE) {
        for (let dr = -1; dr <= 1; dr++) {
            for (let dc = -1; dc <= 1; dc++) {
                let nr = hitRow + dr;
                let nc = hitCol + dc;
                if (bricks[nr] && bricks[nr][nc] && bricks[nr][nc].status === 1) {
                    bricks[nr][nc].status = 0;
                    score += 10;
                }
            }
        }
    }
}

function collisionDetection() {
    for (let r = 0; r < bricks.length; r++) {
        for (let c = 0; c < bricks[r].length; c++) {
            let b = bricks[r][c];
            if (b.status === 1) {
                let brickX = (c * (brickWidth + brickPadding)) + brickOffsetLeft;
                let brickY = (r * (brickHeight + brickPadding)) + brickOffsetTop;
                b.x = brickX;
                b.y = brickY;

                balls.forEach(ball => {
                    if (ball.x > brickX && ball.x < brickX + brickWidth && ball.y > brickY && ball.y < brickY + brickHeight) {
                        ball.dy = -ball.dy;
                        b.status = 0;
                        score += 10;
                        scoreDisplay.innerText = score;
                        triggerBuff(b.type, r, c);
                    }
                });
            }
        }
    }
}

// Mobile and Desktop Input: Tap screen or click mouse when Game Over to restart instantly
function handleRestart() {
    if (gameOver) {
        initGame();
    }
}
window.addEventListener("mousedown", handleRestart);
window.addEventListener("touchstart", (e) => {
    e.preventDefault(); // Prevents modern phone double tap delays
    handleRestart();
}, { passive: false });

function draw() {
    if (gameOver) {
        ctx.fillStyle = "rgba(10,10,15,0.92)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.font = "bold 28px sans-serif";
        ctx.fillStyle = "#ff0055";
        ctx.textAlign = "center";
        ctx.fillText("WALL CRUSH OVERRIDE", canvas.width / 2, canvas.height / 2 - 20);
        
        ctx.font = "20px sans-serif";
        ctx.fillStyle = "#ffffff";
        ctx.fillText(`Final Score: ${score}`, canvas.width / 2, canvas.height / 2 + 20);
        
        ctx.font = "16px sans-serif";
        ctx.fillStyle = "#00f0ff";
        ctx.fillText("Tap Screen or Click to Try Again", canvas.width / 2, canvas.height / 2 + 70);
        
        requestAnimationFrame(draw);
        return;
    }

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.textAlign = "left";

    // 1. Render Brick Wall
    for (let r = 0; r < bricks.length; r++) {
        for (let c = 0; c < bricks[r].length; c++) {
            if (bricks[r][c].status === 1) {
                let brickX = (c * (brickWidth + brickPadding)) + brickOffsetLeft;
                let brickY = (r * (brickHeight + brickPadding)) + brickOffsetTop;
                ctx.beginPath();
                ctx.rect(brickX, brickY, brickWidth, brickHeight);
                ctx.fillStyle = TYPE_COLORS[bricks[r][c].type];
                ctx.fill();
                ctx.closePath();
            }
        }
    }

    // 2. Render Unmovable Base Brick
    ctx.beginPath();
    ctx.rect(paddleX, paddleY, paddleWidth, paddleHeight);
    ctx.fillStyle = "#ffffff";
    ctx.fill();
    ctx.closePath();

    // 3. Render and Calculate Ball Movement
    for (let i = balls.length - 1; i >= 0; i--) {
        let ball = balls[i];
        
        ctx.beginPath();
        ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
        ctx.fillStyle = "#ffffff"; 
        ctx.fill();
        ctx.closePath();

        // Bounce left / right walls
        if (ball.x + ball.dx > canvas.width - ball.radius || ball.x + ball.dx < ball.radius) {
            ball.dx = -ball.dx;
        }
        // Bounce ceiling
        if (ball.y + ball.dy < ball.radius) {
            ball.dy = -ball.dy;
        } 

        // Perfectly accurate bounding box hit for the fixed paddle
        if (ball.y + ball.dy > paddleY - ball.radius && ball.y < paddleY + paddleHeight) {
            if (ball.x > paddleX && ball.x < paddleX + paddleWidth) {
                let hitPoint = ball.x - (paddleX + paddleWidth / 2);
                ball.dx = hitPoint * 0.18; // Angles away safely depending on hit point
                ball.dy = -Math.abs(ball.dy); 
            } 
        }

        // Out of bounds drop check
        if (ball.y > canvas.height) {
            balls.splice(i, 1);
            continue;
        }

        ball.x += ball.dx;
        ball.y += ball.dy;
    }

    if (balls.length === 0) {
        gameOver = true;
    }

    collisionDetection();

    // Automatic progression interval
    if (Date.now() - lastDropTime > rowDropInterval) {
        dropWallDown();
        lastDropTime = Date.now();
        if (rowDropInterval > 3000) rowDropInterval -= 200; 
    }

    requestAnimationFrame(draw);
}

// Run Engine
initGame();
draw();
</script>

</body>
</html>
