<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinite Breakout Survival</title>
    <style>
        body {
            background-color: #111;
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        canvas {
            border: 4px solid #fff;
            background-color: #222;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }
        #scoreBoard {
            font-size: 24px;
            margin-bottom: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="scoreBoard">Score: <span id="score">0</span></div>
    <canvas id="gameCanvas" width="480" height="600"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const scoreDisplay = document.getElementById("score");

// Game Settings
let score = 0;
let gameOver = false;

// Paddle Settings
const paddleHeight = 15;
const paddleWidth = 80;
let paddleX = (canvas.width - paddleWidth) / 2;
let rightPressed = false;
let leftPressed = false;

// Ball Settings (Stored in an array for multi-ball buff)
let balls = [];
const baseBallRadius = 6;
const baseBallSpeed = 4;

// Brick Settings
const brickRowCount = 4; // Initial rows
const brickColumnCount = 6;
const brickWidth = 70;
const brickHeight = 20;
const brickPadding = 5;
const brickOffsetTop = 40;
const brickOffsetLeft = 15;

// Brick Types & Colors
const TYPES = {
    NORMAL: 'normal',
    BIG_BALL: 'bigBall',
    MULTI_BALL: 'multiBall',
    EXPLOSIVE: 'explosive'
};
const TYPE_COLORS = {
    [TYPES.NORMAL]: '#0095DD',
    [TYPES.BIG_BALL]: '#FFD700', // Gold
    [TYPES.MULTI_BALL]: '#00FF00', // Green
    [TYPES.EXPLOSIVE]: '#FF4500'  // Red/Orange
};

let bricks = [];

// Timers for the Infinite Wall Mechanic
let rowDropInterval = 8000; // Time (ms) before wall drops down
let lastDropTime = Date.now();

// --- INITIALIZATION ---

function initGame() {
    score = 0;
    gameOver = false;
    balls = [createNewBall(canvas.width / 2, canvas.height - 50, baseBallSpeed, -baseBallSpeed)];
    
    // Generate Initial Bricks
    bricks = [];
    for (let r = 0; r < brickRowCount; r++) {
        bricks[r] = [];
        for (let c = 0; c < brickColumnCount; c++) {
            bricks[r][c] = createBrick(r, c);
        }
    }
    lastDropTime = Date.now();
}

function createNewBall(x, y, dx, dy, radius = baseBallRadius) {
    return { x, y, dx, dy, radius };
}

function createBrick(row, col) {
    // 25% chance of being a special buff brick
    let type = TYPES.NORMAL;
    const rand = Math.random();
    if (rand > 0.75) {
        const types = [TYPES.BIG_BALL, TYPES.MULTI_BALL, TYPES.EXPLOSIVE];
        type = types[Math.floor(Math.random() * types.length)];
    }
    return { x: 0, y: 0, status: 1, type: type };
}

// --- WALL PROGRESSION (The Twist!) ---

function dropWallDown() {
    // 1. Move all existing rows down by adding a new row at index 0
    let newRow = [];
    for (let c = 0; c < brickColumnCount; c++) {
        newRow.push({ x: 0, y: 0, status: 1, type: TYPES.NORMAL }); // Top row standard, or randomize
    }
    bricks.unshift(newRow); // Push existing rows down sequentially

    // 2. Check for Game Over condition
    // If any active brick crosses the paddle threshold line, it's game over
    for (let r = 0; r < bricks.length; r++) {
        for (let c = 0; c < bricks[r].length; c++) {
            if (bricks[r][c].status === 1) {
                let brickY = (r * (brickHeight + brickPadding)) + brickOffsetTop;
                if (brickY + brickHeight >= canvas.height - paddleHeight - 20) {
                    gameOver = true;
                }
            }
        }
    }
}

// --- INPUT HANDLERS ---

document.addEventListener("keydown", (e) => {
    if (e.key === "Right" || e.key === "ArrowRight") rightPressed = true;
    if (e.key === "Left" || e.key === "ArrowLeft") leftPressed = true;
});
document.addEventListener("keyup", (e) => {
    if (e.key === "Right" || e.key === "ArrowRight") rightPressed = false;
    if (e.key === "Left" || e.key === "ArrowLeft") leftPressed = false;
});

// --- BUFF LOGIC ---

function triggerBuff(type, hitRow, hitCol) {
    if (type === TYPES.BIG_BALL) {
        // Enlarge all existing balls temporarily
        balls.forEach(b => b.radius = 12);
        setTimeout(() => balls.forEach(b => b.radius = baseBallRadius), 8000);
    } 
    else if (type === TYPES.MULTI_BALL) {
        // Spawn 2 extra balls at the paddle going upwards
        balls.push(createNewBall(paddleX + paddleWidth/2, canvas.height - 30, -3, -4));
        balls.push(createNewBall(paddleX + paddleWidth/2, canvas.height - 30, 3, -4));
    } 
    else if (type === TYPES.EXPLOSIVE) {
        // Destroy adjacent bricks (Up, Down, Left, Right)
        const directions = [[-1, 0], [1, 0], [0, -1], [0, 1]];
        directions.forEach(([dr, dc]) => {
            let nr = hitRow + dr;
            let nc = hitCol + dc;
            if (bricks[nr] && bricks[nr][nc] && bricks[nr][nc].status === 1) {
                bricks[nr][nc].status = 0;
                score += 10;
            }
        });
    }
}

// --- COLLISION DETECTION ---

function collisionDetection() {
    for (let r = 0; r < bricks.length; r++) {
        for (let c = 0; c < bricks[r].length; c++) {
            let b = bricks[r][c];
            if (b.status === 1) {
                let brickX = (c * (brickWidth + brickPadding)) + brickOffsetLeft;
                let brickY = (r * (brickHeight + brickPadding)) + brickOffsetTop;
                b.x = brickX;
                b.y = brickY;

                balls.forEach(ball => {
                    if (ball.x > brickX && ball.x < brickX + brickWidth && ball.y > brickY && ball.y < brickY + brickHeight) {
                        ball.dy = -ball.dy;
                        b.status = 0; // Destroy brick
                        score += 10;
                        scoreDisplay.innerText = score;
                        
                        triggerBuff(b.type, r, c);
                    }
                });
            }
        }
    }
}

// --- GAME LOOP ---

function draw() {
    if (gameOver) {
        ctx.fillStyle = "rgba(0,0,0,0.75)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.font = "30px sans-serif";
        ctx.fillStyle = "red";
        ctx.fillText("GAME OVER", canvas.width / 2 - 90, canvas.height / 2);
        ctx.font = "16px sans-serif";
        ctx.fillStyle = "white";
        ctx.fillText("Refresh page to try again!", canvas.width / 2 - 85, canvas.height / 2 + 40);
        return;
    }

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 1. Draw Bricks
    for (let r = 0; r < bricks.length; r++) {
        for (let c = 0; c < bricks[r].length; c++) {
            if (bricks[r][c].status === 1) {
                let brickX = (c * (brickWidth + brickPadding)) + brickOffsetLeft;
                let brickY = (r * (brickHeight + brickPadding)) + brickOffsetTop;
                ctx.beginPath();
                ctx.rect(brickX, brickY, brickWidth, brickHeight);
                ctx.fillStyle = TYPE_COLORS[bricks[r][c].type];
                ctx.fill();
                ctx.closePath();
            }
        }
    }

    // 2. Draw Paddle
    ctx.beginPath();
    ctx.rect(paddleX, canvas.height - paddleHeight - 10, paddleWidth, paddleHeight);
    ctx.fillStyle = "#fff";
    ctx.fill();
    ctx.closePath();

    // 3. Draw & Move Balls
    for (let i = balls.length - 1; i >= 0; i--) {
        let ball = balls[i];
        
        ctx.beginPath();
        ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
        ctx.fillStyle = "#FF007F"; // Neon pink ball
        ctx.fill();
        ctx.closePath();

        // Bounce off Left/Right walls
        if (ball.x + ball.dx > canvas.width - ball.radius || ball.x + ball.dx < ball.radius) {
            ball.dx = -ball.dx;
        }
        // Bounce off Top wall
        if (ball.y + ball.dy < ball.radius) {
            ball.dy = -ball.dy;
        } 
        // Bottom tracking (Paddle bounce or fall out)
        else if (ball.y + ball.dy > canvas.height - paddleHeight - 10 - ball.radius) {
            if (ball.x > paddleX && ball.x < paddleX + paddleWidth) {
                // Change angle slightly based on where it hit the paddle
                let hitPoint = ball.x - (paddleX + paddleWidth / 2);
                ball.dx = hitPoint * 0.15;
                ball.dy = -ball.dy;
            } else if (ball.y > canvas.height) {
                // Remove ball if it falls past the bottom
                balls.splice(i, 1);
                continue; 
            }
        }

        ball.x += ball.dx;
        ball.y += ball.dy;
    }

    // Game Over if all balls are lost
    if (balls.length === 0) {
        gameOver = true;
    }

    // 4. Handle Paddle Movement
    if (rightPressed && paddleX < canvas.width - paddleWidth) paddleX += 7;
    else if (leftPressed && paddleX > 0) paddleX -= 7;

    // 5. Check Buffs/Collisions
    collisionDetection();

    // 6. Infinite Progression Logic: Drop the wall every X seconds
    if (Date.now() - lastDropTime > rowDropInterval) {
        dropWallDown();
        lastDropTime = Date.now();
        // Slightly speed up wall drops over time to increase difficulty
        if (rowDropInterval > 3000) rowDropInterval -= 200; 
    }

    requestAnimationFrame(draw);
}

// Start Game
initGame();
draw();
</script>

</body>
</html>
