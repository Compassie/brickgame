<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinite Brick Siege</title>
    <style>
        body {
            background-color: #111;
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        canvas {
            border: 4px solid #fff;
            background-color: #1a1a1a;
            box-shadow: 0 0 25px rgba(255,255,255,0.15);
        }
        #scoreBoard {
            font-size: 24px;
            margin-bottom: 10px;
            font-weight: bold;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div id="scoreBoard">Score: <span id="score">0</span></div>
    <canvas id="gameCanvas" width="540" height="650"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const scoreDisplay = document.getElementById("score");

// Game Settings
let score = 0;
let gameOver = false;

// STATIONARY PADDLE SETTINGS
const paddleHeight = 15;
const paddleWidth = 100;
// Locked perfectly in the horizontal center
const paddleX = (canvas.width - paddleWidth) / 2; 

// Ball Settings
let balls = [];
const baseBallRadius = 5;
const baseBallSpeed = 4.5;

// ENHANCED BRICK GRID SETTINGS (More, smaller bricks)
const brickRowCount = 10;       // Started with 10 rows instead of 4
const brickColumnCount = 12;    // Expanded to 12 columns instead of 6
const brickWidth = 40;
const brickHeight = 15;
const brickPadding = 3;
const brickOffsetTop = 40;
const brickOffsetLeft = 14;

// Brick Types & Colors
const TYPES = {
    NORMAL: 'normal',
    BIG_BALL: 'bigBall',
    MULTI_BALL: 'multiBall',
    EXPLOSIVE: 'explosive'
};
const TYPE_COLORS = {
    [TYPES.NORMAL]: '#39FF14',    // Neon Green
    [TYPES.BIG_BALL]: '#FFD700',  // Gold
    [TYPES.MULTI_BALL]: '#00FFFF', // Cyan
    [TYPES.EXPLOSIVE]: '#FF3131'  // Neon Red
};

let bricks = [];

// Wall Progression Timers
let rowDropInterval = 7000; // Drops every 7 seconds
let lastDropTime = Date.now();

// --- INITIALIZATION ---

function initGame() {
    score = 0;
    gameOver = false;
    
    // Fire the ball at a slight random angle upwards from the fixed paddle
    let randomAngleX = (Math.random() * 4) - 2; 
    balls = [createNewBall(canvas.width / 2, canvas.height - 40, randomAngleX, -baseBallSpeed)];
    
    // Generate Dense Initial Brick Wall
    bricks = [];
    for (let r = 0; r < brickRowCount; r++) {
        bricks[r] = [];
        for (let c = 0; c < brickColumnCount; c++) {
            bricks[r][c] = createBrick();
        }
    }
    lastDropTime = Date.now();
}

function createNewBall(x, y, dx, dy, radius = baseBallRadius) {
    return { x, y, dx, dy, radius };
}

function createBrick() {
    // 30% chance of spawning a special buff brick due to higher density
    let type = TYPES.NORMAL;
    const rand = Math.random();
    if (rand > 0.70) {
        const types = [TYPES.BIG_BALL, TYPES.MULTI_BALL, TYPES.EXPLOSIVE];
        type = types[Math.floor(Math.random() * types.length)];
    }
    return { x: 0, y: 0, status: 1, type: type };
}

// --- WALL PROGRESSION ---

function dropWallDown() {
    // Insert a dense new row at the top
    let newRow = [];
    for (let c = 0; c < brickColumnCount; c++) {
        newRow.push(createBrick()); 
    }
    bricks.unshift(newRow);

    // Check if the dropping wall hits the stationary paddle zone
    for (let r = 0; r < bricks.length; r++) {
        for (let c = 0; c < bricks[r].length; c++) {
            if (bricks[r][c].status === 1) {
                let brickY = (r * (brickHeight + brickPadding)) + brickOffsetTop;
                // If bricks reach the paddle height threshold -> Game Over
                if (brickY + brickHeight >= canvas.height - paddleHeight - 20) {
                    gameOver = true;
                }
            }
        }
    }
}

// --- BUFF LOGIC ---

function triggerBuff(type, hitRow, hitCol) {
    if (type === TYPES.BIG_BALL) {
        balls.forEach(b => b.radius = 12);
        setTimeout(() => balls.forEach(b => b.radius = baseBallRadius), 6000);
    } 
    else if (type === TYPES.MULTI_BALL) {
        // Spawn 2 extra balls branching outwards
        balls.push(createNewBall(paddleX + paddleWidth/2, canvas.height - 40, -2.5, -4));
        balls.push(createNewBall(paddleX + paddleWidth/2, canvas.height - 40, 2.5, -4));
    } 
    else if (type === TYPES.EXPLOSIVE) {
        // Explode a wider 3x3 radius because the bricks are smaller and tighter
        for (let dr = -1; dr <= 1; dr++) {
            for (let dc = -1; dc <= 1; dc++) {
                let nr = hitRow + dr;
                let nc = hitCol + dc;
                if (bricks[nr] && bricks[nr][nc] && bricks[nr][nc].status === 1) {
                    bricks[nr][nc].status = 0;
                    score += 15;
                }
            }
        }
    }
}

// --- COLLISION DETECTION ---

function collisionDetection() {
    for (let r = 0; r < bricks.length; r++) {
        for (let c = 0; c < bricks[r].length; c++) {
            let b = bricks[r][c];
            if (b.status === 1) {
                let brickX = (c * (brickWidth + brickPadding)) + brickOffsetLeft;
                let brickY = (r * (brickHeight + brickPadding)) + brickOffsetTop;
                b.x = brickX;
                b.y = brickY;

                balls.forEach(ball => {
                    if (ball.x > brickX && ball.x < brickX + brickWidth && ball.y > brickY && ball.y < brickY + brickHeight) {
                        ball.dy = -ball.dy;
                        b.status = 0;
                        score += 10;
                        scoreDisplay.innerText = score;
                        
                        triggerBuff(b.type, r, c);
                    }
                });
            }
        }
    }
}

// --- GAME LOOP ---

function draw() {
    if (gameOver) {
        ctx.fillStyle = "rgba(0,0,0,0.85)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.font = "32px sans-serif";
        ctx.fillStyle = "#FF3131";
        ctx.fillText("WALL CRUSHED YOU", canvas.width / 2 - 160, canvas.height / 2);
        ctx.font = "18px sans-serif";
        ctx.fillStyle = "white";
        ctx.fillText(`Final Score: ${score}`, canvas.width / 2 - 55, canvas.height / 2 + 40);
        return;
    }

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 1. Draw Dense Bricks
    for (let r = 0; r < bricks.length; r++) {
        for (let c = 0; c < bricks[r].length; c++) {
            if (bricks[r][c].status === 1) {
                let brickX = (c * (brickWidth + brickPadding)) + brickOffsetLeft;
                let brickY = (r * (brickHeight + brickPadding)) + brickOffsetTop;
                ctx.beginPath();
                ctx.rect(brickX, brickY, brickWidth, brickHeight);
                ctx.fillStyle = TYPE_COLORS[bricks[r][c].type];
                ctx.fill();
                ctx.closePath();
            }
        }
    }

    // 2. Draw Stationary Bottom Paddle
    ctx.beginPath();
    ctx.rect(paddleX, canvas.height - paddleHeight - 15, paddleWidth, paddleHeight);
    ctx.fillStyle = "#ffffff";
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.closePath();

    // 3. Draw & Move Balls
    for (let i = balls.length - 1; i >= 0; i--) {
        let ball = balls[i];
        
        ctx.beginPath();
        ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
        ctx.fillStyle = "#FF007F"; 
        ctx.fill();
        ctx.closePath();

        // Wall bounces
        if (ball.x + ball.dx > canvas.width - ball.radius || ball.x + ball.dx < ball.radius) {
            ball.dx = -ball.dx;
        }
        if (ball.y + ball.dy < ball.radius) {
            ball.dy = -ball.dy;
        } 
        // Stationary Paddle Hitbox
        else if (ball.y + ball.dy > canvas.height - paddleHeight - 15 - ball.radius) {
            if (ball.x > paddleX && ball.x < paddleX + paddleWidth) {
                // Bounce angle is determined entirely by where it lands on the static brick
                let hitPoint = ball.x - (paddleX + paddleWidth / 2);
                ball.dx = hitPoint * 0.18; // Reflect angle
                ball.dy = -ball.dy;
            } else if (ball.y > canvas.height) {
                // If a ball falls past the static paddle, remove it
                balls.splice(i, 1);
                continue; 
            }
        }

        ball.x += ball.dx;
        ball.y += ball.dy;
    }

    // Game Over if you run out of active balls
    if (balls.length === 0) {
        gameOver = true;
    }

    // 4. Run Checkers
    collisionDetection();

    // 5. Automatic Wall Dropping Logic
    if (Date.now() - lastDropTime > rowDropInterval) {
        dropWallDown();
        lastDropTime = Date.now();
        // Speed up the drop rate slightly over time to pressure the player
        if (rowDropInterval > 2500) rowDropInterval -= 150; 
    }

    requestAnimationFrame(draw);
}

// Start Game
initGame();
draw();
</script>

</body>
</html>
