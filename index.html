<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stationary Brick Siege</title>
    <style>
        body {
            background-color: #0b0b10;
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        canvas {
            border: 4px solid #fff;
            background-color: #121218;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.2);
        }
        #scoreBoard {
            font-size: 26px;
            margin-bottom: 15px;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div id="scoreBoard">Score: <span id="score">0</span></div>
    <canvas id="gameCanvas" width="560" height="680"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const scoreDisplay = document.getElementById("score");

let score = 0;
let gameOver = false;

// THE STATIONARY BRICK AT THE BOTTOM
const paddleHeight = 20;
const paddleWidth = 120;
const paddleX = (canvas.width - paddleWidth) / 2; 
const paddleY = canvas.height - paddleHeight - 25;

// Ball Physics
let balls = [];
const baseBallRadius = 5;
const baseBallSpeed = 5;

// MASSIVE BRICK WALL SETTINGS
const brickRowCount = 12;       
const brickColumnCount = 13;    
const brickWidth = 38;
const brickHeight = 16;
const brickPadding = 3;
const brickOffsetTop = 40;
const brickOffsetLeft = 15;

const TYPES = {
    NORMAL: 'normal',
    BIG_BALL: 'bigBall',
    MULTI_BALL: 'multiBall',
    EXPLOSIVE: 'explosive'
};
const TYPE_COLORS = {
    [TYPES.NORMAL]: '#00f0ff',    // Cyber Cyan
    [TYPES.BIG_BALL]: '#ffcc00',  // Electric Yellow
    [TYPES.MULTI_BALL]: '#00ff66', // Neon Green
    [TYPES.EXPLOSIVE]: '#ff0055'  // Plasma Pink
};

let bricks = [];
let rowDropInterval = 6500; // Wall drops every 6.5 seconds
let lastDropTime = Date.now();

function initGame() {
    score = 0;
    gameOver = false;
    
    // Spawn initial ball
    balls = [createNewBall(canvas.width / 2, paddleY - 20, (Math.random() * 4) - 2, -baseBallSpeed)];
    
    // Build massive initial wall
    bricks = [];
    for (let r = 0; r < brickRowCount; r++) {
        bricks[r] = [];
        for (let c = 0; c < brickColumnCount; c++) {
            bricks[r][c] = createBrick();
        }
    }
    lastDropTime = Date.now();
}

function createNewBall(x, y, dx, dy, radius = baseBallRadius) {
    return { x, y, dx, dy, radius };
}

function createBrick() {
    // 45% chance of spawning special tactical bricks to deal with the dropping wall
    let type = TYPES.NORMAL;
    const rand = Math.random();
    if (rand > 0.55) {
        const types = [TYPES.BIG_BALL, TYPES.MULTI_BALL, TYPES.EXPLOSIVE];
        type = types[Math.floor(Math.random() * types.length)];
    }
    return { x: 0, y: 0, status: 1, type: type };
}

function dropWallDown() {
    let newRow = [];
    for (let c = 0; c < brickColumnCount; c++) {
        newRow.push(createBrick()); 
    }
    bricks.unshift(newRow);

    // Check if the falling wall crushes your stationary brick zone
    for (let r = 0; r < bricks.length; r++) {
        for (let c = 0; c < bricks[r].length; r++) {
            if (bricks[r][c] && bricks[r][c].status === 1) {
                let brickY = (r * (brickHeight + brickPadding)) + brickOffsetTop;
                if (brickY + brickHeight >= paddleY - 10) {
                    gameOver = true;
                }
            }
        }
    }
}

function triggerBuff(type, hitRow, hitCol) {
    if (type === TYPES.BIG_BALL) {
        balls.forEach(b => b.radius = 14);
        setTimeout(() => balls.forEach(b => b.radius = baseBallRadius), 7000);
    } 
    else if (type === TYPES.MULTI_BALL) {
        // Explode into 3 extra balls going out in different directions
        balls.push(createNewBall(canvas.width/2, paddleY - 10, -3, -4));
        balls.push(createNewBall(canvas.width/2, paddleY - 10, 0, -5));
        balls.push(createNewBall(canvas.width/2, paddleY - 10, 3, -4));
    } 
    else if (type === TYPES.EXPLOSIVE) {
        // Deep cross explosion to take out whole vertical columns
        for (let i = -2; i <= 2; i++) {
            if (bricks[hitRow + i] && bricks[hitRow + i][hitCol]) bricks[hitRow + i][hitCol].status = 0;
            if (bricks[hitRow] && bricks[hitRow][hitCol + i]) bricks[hitRow][hitCol + i].status = 0;
            score += 20;
        }
    }
}

function collisionDetection() {
    for (let r = 0; r < bricks.length; r++) {
        for (let c = 0; c < bricks[r].length; c++) {
            let b = bricks[r][c];
            if (b.status === 1) {
                let brickX = (c * (brickWidth + brickPadding)) + brickOffsetLeft;
                let brickY = (r * (brickHeight + brickPadding)) + brickOffsetTop;
                b.x = brickX;
                b.y = brickY;

                balls.forEach(ball => {
                    if (ball.x > brickX && ball.x < brickX + brickWidth && ball.y > brickY && ball.y < brickY + brickHeight) {
                        ball.dy = -ball.dy;
                        b.status = 0;
                        score += 10;
                        scoreDisplay.innerText = score;
                        triggerBuff(b.type, r, c);
                    }
                });
            }
        }
    }
}

function draw() {
    if (gameOver) {
        ctx.fillStyle = "rgba(10,10,15,0.9)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.font = "bold 36px sans-serif";
        ctx.fillStyle = "#ff0055";
        ctx.fillText("WALL CRUSH OVERRIDE", canvas.width / 2 - 210, canvas.height / 2);
        ctx.font = "20px sans-serif";
        ctx.fillStyle = "#ffffff";
        ctx.fillText(`Final Score: ${score}`, canvas.width / 2 - 65, canvas.height / 2 + 50);
        return;
    }

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 1. Draw Massive Moving Wall
    for (let r = 0; r < bricks.length; r++) {
        for (let c = 0; c < bricks[r].length; c++) {
            if (bricks[r][c].status === 1) {
                let brickX = (c * (brickWidth + brickPadding)) + brickOffsetLeft;
                let brickY = (r * (brickHeight + brickPadding)) + brickOffsetTop;
                ctx.beginPath();
                ctx.rect(brickX, brickY, brickWidth, brickHeight);
                ctx.fillStyle = TYPE_COLORS[bricks[r][c].type];
                ctx.fill();
                ctx.closePath();
            }
        }
    }

    // 2. Draw Bottom Unmovable Brick
    ctx.beginPath();
    ctx.rect(paddleX, paddleY, paddleWidth, paddleHeight);
    ctx.fillStyle = "#ffffff";
    ctx.fill();
    ctx.closePath();

    // 3. Process Balls with Magnetic Gravity Assist
    for (let i = balls.length - 1; i >= 0; i--) {
        let ball = balls[i];
        
        ctx.beginPath();
        ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
        ctx.fillStyle = "#ffffff"; 
        ctx.fill();
        ctx.closePath();

        // Screen Borders
        if (ball.x + ball.dx > canvas.width - ball.radius || ball.x + ball.dx < ball.radius) {
            ball.dx = -ball.dx;
        }
        if (ball.y + ball.dy < ball.radius) {
            ball.dy = -ball.dy;
        } 

        // THE PADDLE MAGNET: Pulls balls gently toward the center static brick if they get too low
        if (ball.y > canvas.height * 0.65 && ball.y < paddleY) {
            let centerPaddleX = paddleX + (paddleWidth / 2);
            let pullDirection = centerPaddleX - ball.x;
            ball.dx += pullDirection * 0.012; // Tweaks trajectory automatically
        }

        // Stationary Paddle Hit detection
        if (ball.y + ball.dy > paddleY - ball.radius && ball.y < paddleY + paddleHeight) {
            if (ball.x > paddleX && ball.x < paddleX + paddleWidth) {
                let hitPoint = ball.x - (paddleX + paddleWidth / 2);
                ball.dx = hitPoint * 0.22; // Bounce off dynamically based on impact position
                ball.dy = -Math.abs(ball.dy); // Push back up
            } else if (ball.y > canvas.height) {
                balls.splice(i, 1);
                continue; 
            }
        }

        ball.x += ball.dx;
        ball.y += ball.dy;
    }

    if (balls.length === 0) {
        gameOver = true;
    }

    collisionDetection();

    // Wall Progression Timing
    if (Date.now() - lastDropTime > rowDropInterval) {
        dropWallDown();
        lastDropTime = Date.now();
        if (rowDropInterval > 2200) rowDropInterval -= 200; 
    }

    requestAnimationFrame(draw);
}

initGame();
draw();
</script>

</body>
</html>
